<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BS分析レポート｜財務体質の可視化</title>
<style>
  :root {
    --serif: "Yu Mincho","YuMincho","Hiragino Mincho ProN","Noto Serif JP",serif;
    --sans: "Yu Gothic","YuGothic","Hiragino Kaku Gothic ProN","Noto Sans JP","Meiryo",sans-serif;
    --paper: #f7f4ec;
    --panel: #fffdf8;
    --ink:   #211f1b;
    --sub:   #6f675a;
    --rule:  #d8d0bf;
    --rule2: #b9ad95;
    --accent:#243b56;
    --pos:   #2f6b40;
    --neg:   #9a2b25;
  }
  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    font-family: var(--sans); color: var(--ink); background: var(--paper);
    margin: 0; padding: 40px 18px 64px; line-height: 1.8;
    font-feature-settings: "palt";
  }
  .sheet {
    max-width: 760px; margin: 0 auto; background: var(--panel);
    border: 1px solid var(--rule2); padding: 44px 48px 40px;
    box-shadow: 0 1px 0 var(--rule);
  }
  @media (max-width: 620px) { .sheet { padding: 28px 22px; } body { padding: 18px 10px 40px; } }

  .masthead { text-align: center; border-bottom: 3px double var(--rule2); padding-bottom: 18px; margin-bottom: 10px; }
  .overline { font-size: 11px; letter-spacing: .42em; color: var(--accent); text-indent: .42em; margin: 0 0 8px; }
  h1 { font-family: var(--serif); font-weight: 600; font-size: 26px; letter-spacing: .1em; margin: 0; }
  .meta { margin: 12px 0 0; font-size: 12px; color: var(--sub); letter-spacing: .08em; }
  .meta span { margin: 0 .55em; }

  h2 {
    font-family: var(--serif); font-weight: 600; font-size: 17px; letter-spacing: .08em;
    margin: 38px 0 14px; padding-bottom: 7px; border-bottom: 1px solid var(--rule2);
    display: flex; align-items: baseline; gap: .6em;
  }
  h2 .no { font-size: 13px; color: var(--accent); letter-spacing: .1em; }
  .note { font-size: 12px; color: var(--sub); margin: 8px 0 0; }

  table { width: 100%; border-collapse: collapse; font-size: 14.5px; }
  th, td { padding: 9px 6px; border-bottom: 1px solid var(--rule); }
  thead th { color: var(--sub); font-weight: 600; font-size: 11.5px; letter-spacing: .12em; border-bottom: 1px solid var(--rule2); }
  td.num, th.num { text-align: right; font-family: var(--serif); font-variant-numeric: tabular-nums; letter-spacing: .02em; }
  td.cat { color: var(--sub); font-size: 12.5px; }
  td.formula { color: var(--sub); font-size: 12px; }
  tr.level td { font-weight: 600; }
  tr.level td.num { font-size: 15.5px; }
  td.metric { font-weight: 600; }

  /* グラフ */
  .chart-wrap { overflow-x: auto; margin-top: 8px; padding-bottom: 4px; }
  canvas#chart { width: 100%; min-width: 520px; height: 470px; display: block; }
  .legend { display: flex; flex-wrap: wrap; gap: 14px 20px; margin-top: 12px; font-size: 12px; color: var(--sub); }
  .legend span { display: inline-flex; align-items: center; gap: 6px; }
  .legend i { width: 12px; height: 12px; border-radius: 1px; display: inline-block; }

  footer { max-width: 760px; margin: 18px auto 0; text-align: center; font-size: 11px; color: var(--sub); letter-spacing: .08em; line-height: 1.9; }
  footer a { color: var(--accent); text-decoration: none; }
  footer a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="sheet">

  <div class="masthead">
    <p class="overline">BALANCE SHEET STRUCTURE</p>
    <h1>BS分析レポート｜財務体質の可視化</h1>
    <p class="meta"><span>例題</span>｜<span>単一時点</span>｜<span>単位：円</span></p>
  </div>

  <!-- Ⅰ 入力データ -->
  <section>
    <h2><span class="no">Ⅰ</span> 入力データ</h2>
    <table>
      <thead><tr><th>科目</th><th>区分</th><th class="num">金額</th></tr></thead>
      <tbody id="inputTable"></tbody>
    </table>
    <p class="note">資産合計 ＝ 負債合計 ＋ 純資産 で貸借が一致しています。</p>
  </section>

  <!-- Ⅱ 財務指標 -->
  <section>
    <h2><span class="no">Ⅱ</span> 財務指標</h2>
    <table>
      <thead><tr><th>指標</th><th class="formula">算式</th><th class="num">数値</th></tr></thead>
      <tbody id="ratioTable"></tbody>
    </table>
  </section>

  <!-- Ⅲ BS構成図 -->
  <section>
    <h2><span class="no">Ⅲ</span> BS構成図</h2>
    <div class="chart-wrap"><canvas id="chart"></canvas></div>
    <div class="legend" id="legend"></div>
    <p class="note">左列に資産、右列に負債・純資産を配置し、各ブロックの高さ（面積）を金額に比例させています。左右の総高が一致＝貸借一致を表します。</p>
  </section>

</div>
<footer>
  BS分析レポート ／ 単一ファイル・外部ライブラリ不使用<br>
  制作：大塚　春 ｜ 2026年6月 ｜ GitHub: <a href="https://github.com/harurun0226-art" target="_blank" rel="noopener">https://github.com/harurun0226-art</a>
</footer>

<script>
"use strict";

// ===== 固定データ（例題）=====
const D = {
  currentAssets: 2000000,   // 流動資産
  fixedAssets:   3000000,   // 固定資産
  currentLiab:   1200000,   // 流動負債
  fixedLiab:     1800000,   // 固定負債
  equity:        2000000,   // 純資産
};

// ===== 計算 =====
const totalAssets = D.currentAssets + D.fixedAssets;          // 資産合計
const totalLiab   = D.currentLiab + D.fixedLiab;              // 負債合計
const totalLE     = totalLiab + D.equity;                     // 負債純資産合計

const yen = v => (v < 0 ? "−" : "") + "¥" + Math.abs(v).toLocaleString("ja-JP");
const pct = v => (v * 100).toLocaleString("ja-JP", { minimumFractionDigits: 1, maximumFractionDigits: 1 }) + "%";

// ===== Ⅰ 入力データ表 =====
(function renderInput() {
  const rows = [
    ["流動資産", "資産", D.currentAssets],
    ["固定資産", "資産", D.fixedAssets],
    ["資産合計", "資産", totalAssets, true],
    ["流動負債", "負債", D.currentLiab],
    ["固定負債", "負債", D.fixedLiab],
    ["純資産", "純資産", D.equity],
    ["負債純資産合計", "負債＋純資産", totalLE, true],
  ];
  document.getElementById("inputTable").innerHTML = rows.map(
    r => `<tr class="${r[3] ? "level" : ""}"><td>${r[0]}</td><td class="cat">${r[1]}</td><td class="num">${yen(r[2])}</td></tr>`).join("");
})();

// ===== Ⅱ 財務指標 表 =====
(function renderRatio() {
  const rows = [
    ["自己資本比率", "純資産 ÷ 資産合計", D.equity / totalAssets],
    ["流動比率",     "流動資産 ÷ 流動負債", D.currentAssets / D.currentLiab],
    ["固定比率",     "固定資産 ÷ 純資産",   D.fixedAssets / D.equity],
  ];
  document.getElementById("ratioTable").innerHTML = rows.map(
    r => `<tr><td class="metric">${r[0]}</td><td class="formula">${r[1]}</td><td class="num">${pct(r[2])}</td></tr>`).join("");
})();

// ===== Ⅲ BS構成図（Canvas API・外部ライブラリ不使用）=====
const COL = {
  currentAssets: "#7fa8c9",  // 流動資産：ライトブルー
  fixedAssets:   "#243b56",  // 固定資産：ネイビー
  currentLiab:   "#d08a86",  // 流動負債：ライトレッド
  fixedLiab:     "#9a2b25",  // 固定負債：レッド
  equity:        "#2f6b40",  // 純資産：グリーン
};
const LEFT  = [ // 上→下
  { name: "流動資産", value: D.currentAssets, color: COL.currentAssets },
  { name: "固定資産", value: D.fixedAssets,   color: COL.fixedAssets },
];
const RIGHT = [ // 上→下
  { name: "流動負債", value: D.currentLiab, color: COL.currentLiab },
  { name: "固定負債", value: D.fixedLiab,   color: COL.fixedLiab },
  { name: "純資産",   value: D.equity,      color: COL.equity },
];

// 凡例
document.getElementById("legend").innerHTML = [...LEFT, ...RIGHT].map(
  s => `<span><i style="background:${s.color}"></i>${s.name}</span>`).join("");

function man(v) { return v === 0 ? "0" : (v / 10000).toLocaleString("ja-JP") + "万"; }

function drawChart() {
  const canvas = document.getElementById("chart");
  const cssW = canvas.clientWidth, cssH = 470;
  const dpr = window.devicePixelRatio || 1;
  canvas.width = Math.round(cssW * dpr);
  canvas.height = Math.round(cssH * dpr);
  const ctx = canvas.getContext("2d");
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, cssW, cssH);

  const m = { top: 38, right: 18, bottom: 30, left: 18 };
  const plotW = cssW - m.left - m.right;
  const plotH = cssH - m.top - m.bottom;
  const serif = getComputedStyle(document.body).getPropertyValue("--serif");

  const colW = Math.min(plotW * 0.40, 230);
  const gap  = plotW - colW * 2;
  const leftX  = m.left + (plotW - (colW * 2 + Math.min(gap, 60))) / 2;
  const colGap = Math.min(gap, 60);
  const rightX = leftX + colW + colGap;

  // 左右の総額（貸借一致なので等しい）を同じ高さ basis にそろえる
  const basis = Math.max(totalAssets, totalLE);
  const scale = plotH / basis;

  // 列見出し
  ctx.fillStyle = "#243b56";
  ctx.font = '13px ' + serif;
  ctx.textAlign = "center";
  ctx.textBaseline = "alphabetic";
  ctx.fillText("資  産", leftX + colW / 2, m.top - 14);
  ctx.fillText("負債・純資産", rightX + colW / 2, m.top - 14);

  function drawColumn(x, blocks) {
    let y = m.top;
    blocks.forEach(b => {
      const h = b.value * scale;
      ctx.fillStyle = b.color;
      ctx.fillRect(x, y, colW, h);
      ctx.strokeStyle = "#fffdf8";
      ctx.lineWidth = 1.5;
      ctx.strokeRect(x, y, colW, h);

      // ラベル（科目名＋金額）。高さが足りない時は1行に。
      const cx = x + colW / 2, cy = y + h / 2;
      const lum = parseInt(b.color.slice(1, 3), 16) * 0.299
                + parseInt(b.color.slice(3, 5), 16) * 0.587
                + parseInt(b.color.slice(5, 7), 16) * 0.114;
      ctx.fillStyle = lum > 150 ? "#211f1b" : "#fffdf8";
      ctx.textAlign = "center";
      if (h >= 40) {
        ctx.font = '13px ' + serif;
        ctx.textBaseline = "bottom";
        ctx.fillText(b.name, cx, cy - 1);
        ctx.font = '12px ' + serif;
        ctx.textBaseline = "top";
        ctx.fillText(yen(b.value), cx, cy + 2);
      } else {
        ctx.font = '12px ' + serif;
        ctx.textBaseline = "middle";
        ctx.fillText(b.name + "  " + yen(b.value), cx, cy);
      }
      y += h;
    });
    return y;
  }

  const leftBottom  = drawColumn(leftX, LEFT);
  const rightBottom = drawColumn(rightX, RIGHT);

  // 合計ラベル（各列の下）
  ctx.fillStyle = "#6f675a";
  ctx.font = '11.5px ' + serif;
  ctx.textBaseline = "top";
  ctx.textAlign = "center";
  ctx.fillText("資産合計 " + yen(totalAssets), leftX + colW / 2, leftBottom + 8);
  ctx.fillText("負債純資産合計 " + yen(totalLE), rightX + colW / 2, rightBottom + 8);
}

drawChart();
let rT;
window.addEventListener("resize", () => { clearTimeout(rT); rT = setTimeout(drawChart, 120); });
</script>
</body>
</html>
